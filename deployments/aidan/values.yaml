# Non-secret Aisy dev workspace identity. Shared cluster/build/network settings
# come from deployments/aisy-dev/site-values.yaml.
namespace: ws-aidan

user:
  name: aidan
  host: aidan.coder.shadw.stream
  pvcSize: 50Gi
  env: []

oauth2:
  githubUsers: aidan-aisy

resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "4"
    memory: 8Gi
