suite: workspace ServiceAccount RBAC — Jobs grant is kaniko/buildkit-only
# The only thing that ever creates a `kind: Job` is the kaniko wrapper (see
# base-infrastructure/templates/configmaps.yaml) — depot builds run on
# Depot's remote builders with no in-cluster Job at all. Least privilege:
# don't grant Jobs RBAC to a workspace that can never use it.
templates:
  - templates/serviceaccount.yaml
values:
  - test-values.yaml
tests:
  - it: grants batch/jobs RBAC by default (kaniko mode)
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["batch"]
            resources: ["jobs"]
            verbs: ["create", "get", "list", "watch", "delete"]

  - it: grants batch/jobs RBAC in buildkit mode (docker-build still spawns a kaniko Job)
    set:
      build.mode: buildkit
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["batch"]
            resources: ["jobs"]
            verbs: ["create", "get", "list", "watch", "delete"]

  - it: omits batch/jobs RBAC in depot mode (no in-cluster builds to run)
    set:
      build.mode: depot
    documentIndex: 1
    asserts:
      - notContains:
          path: rules
          any: true
          content:
            apiGroups: ["batch"]
            resources: ["jobs"]
            verbs: ["create", "get", "list", "watch", "delete"]

  - it: still grants batch/cronjobs RBAC in depot mode (unrelated to builds)
    set:
      build.mode: depot
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["batch"]
            resources: ["cronjobs"]
            verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
