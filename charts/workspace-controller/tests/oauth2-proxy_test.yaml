suite: workspace-controller oauth2-proxy HA
templates:
  - templates/oauth2-proxy.yaml
values:
  - test-values.yaml
tests:
  - it: renders 4 documents by default (Secret + Deployment + Service + PDB)
    asserts:
      - hasDocuments:
          count: 4

  - it: existingSecretName suppresses the inline Secret (3 documents, no required guard)
    set:
      oauth2.existingSecretName: my-controller-oauth2-secret
      oauth2.cookieSecret: ""
      oauth2.clientId: ""
      oauth2.clientSecret: ""
    asserts:
      - hasDocuments:
          count: 3

  - it: existingSecretName wires the Deployment env from the referenced Secret
    set:
      oauth2.existingSecretName: my-controller-oauth2-secret
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OAUTH2_PROXY_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: my-controller-oauth2-secret
                key: client-id
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OAUTH2_PROXY_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: my-controller-oauth2-secret
                key: client-secret
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OAUTH2_PROXY_COOKIE_SECRET
            valueFrom:
              secretKeyRef:
                name: my-controller-oauth2-secret
                key: cookie-secret

  - it: should run two proxy replicas spread across nodes
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.replicas
          value: 2
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].topologyKey
          value: kubernetes.io/hostname
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].whenUnsatisfiable
          value: ScheduleAnyway
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels.app
          value: workspace-controller-oauth2

  - it: should keep one proxy available via a PDB
    documentSelector:
      path: kind
      value: PodDisruptionBudget
    asserts:
      - equal:
          path: apiVersion
          value: policy/v1
      - equal:
          path: metadata.name
          value: workspace-controller-oauth2
      - equal:
          path: spec.minAvailable
          value: 1
      - equal:
          path: spec.selector.matchLabels.app
          value: workspace-controller-oauth2
